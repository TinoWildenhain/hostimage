# Ubuntu release (LTS); e.g. jammy (22.04), noble (24.04)
OS_RELEASE=noble
APT_MIRROR=http://archive.ubuntu.com/ubuntu
# Resources
MEM_MB=4096
VCPUS=2

# Hostname
HOSTNAME=test

# Disk layout for system disk
DISK_SIZE_GB=20
VG_NAME="${HOSTNAME}-vgsys"
LV_ROOT_SIZE_GB=16
# Swap moved to data disk; system disk doesn’t host swap
# LV_SWAP_SIZE_GB not used anymore
# Data disk layout (for /var, /home, swap)
DATA_DISK_SIZE_GB=40
DATA_VG_NAME="${HOSTNAME}-vgdata"
LV_VAR_SIZE_GB=10
LV_HOME_SIZE_GB=20
LV_SWAP_SIZE_GB=4
LV_VAR_NAME=var
LV_HOME_NAME=home
LV_SWAP_NAME=swap
# Network
NETWORK_IFACE=eth0
NETWORK_USE_DHCP=false
NETWORK_ADDRESS=192.168.1.2
NETWORK_GATEWAY=192.168.1.1
NETWORK_DNS="192.168.1.1"

# Primary user (password + SSH key from Key Vault)
PRIMARY_USER=test
# These will be populated from Azure Key Vault secrets in the pipeline:
# PRIMARY_USER_PASSWORD_HASH  (mkpasswd -m sha-512)
PRIMARY_USER_PASSWORD_HASH=
PRIMARY_USER_SSH_PUBKEY=

# Extra repositories
EXTRA_REPOSITORIES="postgresql"
# Packages to install
EXTRA_PACKAGES="wget vim sudo openssh-server lvm2"

# Guest tooling
# Always install open-vm-tools; set this to 'true' to also install qemu-guest-agent
INSTALL_KVM_TOOLS=true
